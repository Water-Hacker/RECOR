# D ↔ V loop integration stack: Postgres × 2 + Declaration + Verification.
#
# Bring up with:
#   docker compose -f docker-compose.integration.yaml up -d --build
#
# Smoke (from this directory):
#   ./scripts/integration-smoke.sh

name: recor-dv-loop

networks:
  loop:
    driver: bridge

volumes:
  pg-decl-data:
  pg-ver-data:

services:
  # ─── Postgres for the Declaration service ───────────────────────────
  postgres-declaration:
    image: postgres:17-alpine
    container_name: recor-loop-pg-decl
    environment:
      POSTGRES_USER: recor
      POSTGRES_PASSWORD: "${RECOR_DB_PASSWORD:?Set RECOR_DB_PASSWORD}"
      POSTGRES_DB: declaration
    volumes: [pg-decl-data:/var/lib/postgresql/data]
    networks: [loop]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recor -d declaration"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ─── Postgres for the Verification engine ───────────────────────────
  postgres-verification:
    image: postgres:17-alpine
    container_name: recor-loop-pg-ver
    environment:
      POSTGRES_USER: recor
      POSTGRES_PASSWORD: "${RECOR_DB_PASSWORD}"
      POSTGRES_DB: verification
    volumes: [pg-ver-data:/var/lib/postgresql/data]
    networks: [loop]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recor -d verification"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ─── Declaration service (with outbox relay enabled) ────────────────
  declaration:
    build:
      # Workspace root — Dockerfile needs sibling crates (packages/recor-auth-oidc).
      context: ../..
      dockerfile: services/declaration/Dockerfile
    image: recor/declaration:dev
    container_name: recor-loop-declaration
    depends_on:
      postgres-declaration: { condition: service_healthy }
      verification:        { condition: service_healthy }
    environment:
      RUST_BACKTRACE: "1"
      BIND_ADDR: "0.0.0.0:8080"
      # R-DECL-8: gRPC surface alongside REST. Bound to 9080 so the
      # two transports do not fight for the same port. Empty disables
      # gRPC entirely; this compose stack opts in so the integration
      # loop exercises both surfaces.
      GRPC_BIND_ADDR: "0.0.0.0:9080"
      DATABASE_URL: "postgres://recor:${RECOR_DB_PASSWORD}@postgres-declaration:5432/declaration"
      DB_POOL_MAX_CONNECTIONS: "10"
      OTLP_ENDPOINT: ""
      LOG_FILTER: "info,recor_declaration=debug,sqlx=warn"
      SERVICE_NAME: "recor-declaration"
      ENVIRONMENT: "dev"
      HTTP_TIMEOUT_SECONDS: "10"
      RECOR_BASE_URL: "http://localhost:8080"
      # Outbound relay — D → V: events POST to the verification engine's
      # internal webhook. Channel-specific secret (R-LOOP-4-ROT); a
      # compromise of one channel's secret does not affect the other.
      RELAY_WEBHOOK_URL: "http://verification:8081/v1/internal/declaration-events"
      RELAY_HMAC_SECRET: "${RECOR_D_TO_V_HMAC:?Set RECOR_D_TO_V_HMAC}"
      RELAY_POLL_INTERVAL_SECONDS: "2"
      # Inbound writeback — V → D: verification engine's outbox relay
      # POSTs verification.completed.v1 here. Distinct secret for the
      # V → D channel.
      WRITEBACK_HMAC_SECRET: "${RECOR_V_TO_D_HMAC:?Set RECOR_V_TO_D_HMAC}"
      # Optional "still-valid old" secret accepted during rotation.
      # Empty in steady state; set during a rotation window. See
      # docs/runbooks/hmac-secret-rotation.md.
      WRITEBACK_HMAC_SECRET_OLD: "${RECOR_V_TO_D_HMAC_OLD:-}"
      # CORS allowlist for the declarant portal in dev / CI. The
      # portal nginx serves the SPA on :8082 and the SPA fetches
      # the declaration API on :8080 — different origins from the
      # browser's view, so the API must echo Access-Control-Allow-*
      # for the portal's origin. Production deployments typically
      # proxy the API through the portal's nginx and leave this empty.
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:8082,http://localhost:8082}"
    # R-DECL-8: expose the gRPC port alongside REST. Host-side bind
    # is 9080 (matches the GRPC_BIND_ADDR above). The smoke scripts
    # continue to use REST on 8080; gRPC is reachable for `grpcurl`
    # and any future polyglot consumer of the .proto.
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9080:9080"
    networks: [loop]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  # ─── Verification engine (inbound webhook enabled) ──────────────────
  verification:
    build:
      # Workspace root — Dockerfile needs sibling crates (packages/recor-auth-oidc).
      context: ../..
      dockerfile: services/verification-engine/Dockerfile
    image: recor/verification-engine:dev
    container_name: recor-loop-verification
    depends_on:
      postgres-verification: { condition: service_healthy }
    environment:
      RUST_BACKTRACE: "1"
      BIND_ADDR: "0.0.0.0:8081"
      DATABASE_URL: "postgres://recor:${RECOR_DB_PASSWORD}@postgres-verification:5432/verification"
      DB_POOL_MAX_CONNECTIONS: "10"
      OTLP_ENDPOINT: ""
      LOG_FILTER: "info,recor_verification_engine=debug,sqlx=warn"
      SERVICE_NAME: "recor-verification-engine"
      ENVIRONMENT: "dev"
      HTTP_TIMEOUT_SECONDS: "30"
      RECOR_BASE_URL: "http://localhost:8081"
      # D → V channel: verifies envelopes from the declaration service's
      # outbox relay. Same secret value the signer side uses.
      INBOUND_HMAC_SECRET: "${RECOR_D_TO_V_HMAC}"
      # Optional "still-valid old" secret accepted during rotation.
      INBOUND_HMAC_SECRET_OLD: "${RECOR_D_TO_V_HMAC_OLD:-}"
      # Writeback relay — V → D: ships verification.completed.v1 events
      # back to the Declaration service so the aggregate can transition.
      WRITEBACK_URL: "http://declaration:8080/v1/internal/verification-outcomes"
      WRITEBACK_HMAC_SECRET: "${RECOR_V_TO_D_HMAC}"
      WRITEBACK_POLL_INTERVAL_SECONDS: "2"
    ports: ["127.0.0.1:8081:8081"]
    networks: [loop]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
