# Rust toolchain pin.
#
# Bumped from V3 P12's 1.84.0 because that pin is incompatible with the
# modern crate dependency graph: `time-core` ≥ 0.1.8, `darling` ≥ 0.23,
# `home` ≥ 0.5.12 etc. require edition 2024, stabilised in Rust 1.85.0.
# Many actively-maintained crates have raised MSRV to 1.88. Pinning to
# 1.88.0 satisfies the dep graph and aligns with Architecture V3 P8's
# "Rust 2024 edition" commitment (we keep Cargo.toml at edition 2021 for
# now until the workspace-wide edition migration ticket lands).
#
# Filed: R-LANG-1 — bump V3 P12 toolchain pin to 1.88.0 across the
# Companion and migrate Cargo.toml manifests to edition = "2024".

[toolchain]
channel = "1.88.0"
components = ["rustfmt", "clippy", "rust-analyzer", "rust-src"]
targets = ["x86_64-unknown-linux-gnu"]
profile = "default"
