# R-LOOP-2 — D ↔ V loop with Kafka transport ON.
#
# Same shape as docker-compose.integration.yaml plus:
#   - a kafka service (bitnami/kafka, KRaft, single-broker)
#   - RELAY_TRANSPORT=kafka on the declaration service
#   - VERIFICATION_TRANSPORT=kafka on the verification engine
#
# Both transports run in parallel during the cutover window:
# the HTTP outbox-relay still POSTs to the V-engine's HTTP webhook AND
# the Kafka producer publishes to the same event topic. The V-engine
# consumer + HTTP webhook both feed the same use case, which is
# idempotent on event_id — the duplicate is absorbed.
#
# Bring up with:
#   docker compose -f docker-compose.kafka.yaml up -d --build
#   docker compose -f docker-compose.kafka.yaml exec kafka \
#       /opt/bitnami/kafka/bin/kafka-topics.sh \
#       --bootstrap-server 127.0.0.1:9092 --create --if-not-exists \
#       --topic recor.declaration.events.v1 --partitions 3 \
#       --replication-factor 1
#
# (Or run ../../infrastructure/kafka/topics-init.sh against this stack;
# the smoke script wires this for you.)

name: recor-dv-loop-kafka

networks:
  loop:
    driver: bridge

volumes:
  pg-decl-data:
  pg-ver-data:
  kafka-data:

services:
  postgres-declaration:
    image: postgres:17-alpine
    container_name: recor-loop-kafka-pg-decl
    environment:
      POSTGRES_USER: recor
      POSTGRES_PASSWORD: "${RECOR_DB_PASSWORD:?Set RECOR_DB_PASSWORD}"
      POSTGRES_DB: declaration
    volumes: [pg-decl-data:/var/lib/postgresql/data]
    networks: [loop]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recor -d declaration"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-verification:
    image: postgres:17-alpine
    container_name: recor-loop-kafka-pg-ver
    environment:
      POSTGRES_USER: recor
      POSTGRES_PASSWORD: "${RECOR_DB_PASSWORD}"
      POSTGRES_DB: verification
    volumes: [pg-ver-data:/var/lib/postgresql/data]
    networks: [loop]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recor -d verification"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: bitnami/kafka:3.7
    container_name: recor-loop-kafka
    networks: [loop]
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,EXTERNAL://127.0.0.1:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server 127.0.0.1:9092 >/dev/null 2>&1 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  declaration:
    build:
      context: ../..
      dockerfile: services/declaration/Dockerfile
    image: recor/declaration:dev
    container_name: recor-loop-kafka-declaration
    depends_on:
      postgres-declaration: { condition: service_healthy }
      verification:        { condition: service_healthy }
      kafka:               { condition: service_healthy }
    environment:
      RUST_BACKTRACE: "1"
      BIND_ADDR: "0.0.0.0:8080"
      DATABASE_URL: "postgres://recor:${RECOR_DB_PASSWORD}@postgres-declaration:5432/declaration"
      DB_POOL_MAX_CONNECTIONS: "10"
      OTLP_ENDPOINT: ""
      LOG_FILTER: "info,recor_declaration=debug,sqlx=warn"
      SERVICE_NAME: "recor-declaration"
      ENVIRONMENT: "dev"
      HTTP_TIMEOUT_SECONDS: "10"
      RECOR_BASE_URL: "http://localhost:8080"
      # HTTP outbox-relay (still active during the cutover).
      RELAY_WEBHOOK_URL: "http://verification:8081/v1/internal/declaration-events"
      RELAY_HMAC_SECRET: "${RECOR_D_TO_V_HMAC:?Set RECOR_D_TO_V_HMAC}"
      RELAY_POLL_INTERVAL_SECONDS: "2"
      WRITEBACK_HMAC_SECRET: "${RECOR_V_TO_D_HMAC:?Set RECOR_V_TO_D_HMAC}"
      WRITEBACK_HMAC_SECRET_OLD: "${RECOR_V_TO_D_HMAC_OLD:-}"
      # R-LOOP-2: Kafka producer is ON.
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_DECLARATION_TOPIC: "recor.declaration.events.v1"
      RELAY_TRANSPORT: "kafka"
    ports:
      - "127.0.0.1:8080:8080"
    networks: [loop]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  verification:
    build:
      context: ../..
      dockerfile: services/verification-engine/Dockerfile
    image: recor/verification-engine:dev
    container_name: recor-loop-kafka-verification
    depends_on:
      postgres-verification: { condition: service_healthy }
      kafka:                 { condition: service_healthy }
    environment:
      RUST_BACKTRACE: "1"
      BIND_ADDR: "0.0.0.0:8081"
      DATABASE_URL: "postgres://recor:${RECOR_DB_PASSWORD}@postgres-verification:5432/verification"
      DB_POOL_MAX_CONNECTIONS: "10"
      OTLP_ENDPOINT: ""
      LOG_FILTER: "info,recor_verification_engine=debug,sqlx=warn"
      SERVICE_NAME: "recor-verification-engine"
      ENVIRONMENT: "dev"
      HTTP_TIMEOUT_SECONDS: "30"
      RECOR_BASE_URL: "http://localhost:8081"
      INBOUND_HMAC_SECRET: "${RECOR_D_TO_V_HMAC}"
      INBOUND_HMAC_SECRET_OLD: "${RECOR_D_TO_V_HMAC_OLD:-}"
      WRITEBACK_URL: "http://declaration:8080/v1/internal/verification-outcomes"
      WRITEBACK_HMAC_SECRET: "${RECOR_V_TO_D_HMAC}"
      WRITEBACK_POLL_INTERVAL_SECONDS: "2"
      # R-LOOP-2: Kafka consumer is ON.
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_DECLARATION_TOPIC: "recor.declaration.events.v1"
      KAFKA_CONSUMER_GROUP: "recor-verification-engine-smoke"
      VERIFICATION_TRANSPORT: "kafka"
    ports: ["127.0.0.1:8081:8081"]
    networks: [loop]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
