# Common-base host hardening. Idempotent — safe to re-run.
- name: RÉCOR common-base bootstrap
  hosts: all
  become: true
  vars:
    recor_admins:
      # Operator public keys; injected via ansible-vault per env.
      []

  tasks:
    - name: Ensure required apt packages are present
      apt:
        name:
          - ca-certificates
          - curl
          - openssh-server
          - chrony            # NTP — D-clock-skew alignment for HMAC iat window
          - rsyslog
          - unattended-upgrades
        state: present
        update_cache: yes
        cache_valid_time: 3600

    - name: Disable password SSH; key-only login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        validate: '/usr/sbin/sshd -t -f %s'
      notify: restart sshd

    - name: Configure unattended-upgrades for security patches
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

    - name: Drop journald to bounded disk
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?SystemMaxUse'
        line: 'SystemMaxUse=2G'
      notify: restart journald

    - name: Sync chrony for FIND-012 iat-window correctness
      service:
        name: chrony
        state: started
        enabled: yes

  handlers:
    - name: restart sshd
      service:
        name: ssh
        state: restarted
    - name: restart journald
      service:
        name: systemd-journald
        state: restarted
