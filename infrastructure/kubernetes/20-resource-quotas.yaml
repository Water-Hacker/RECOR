# Per-namespace resource ceilings. Adjust per-environment via Helm
# values (dev tighter than prod).
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: recor-default-quota
  namespace: recor
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    pods: "100"
    services: "30"
    persistentvolumeclaims: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: recor-default-limits
  namespace: recor
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 128Mi
      max:
        cpu: "2"
        memory: 4Gi
