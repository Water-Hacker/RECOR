# ArgoCD application for the RÉCOR observability stack.
# Source: infrastructure/helm/observability with the per-cluster overlay.
#
# Apply once per cluster, by SRE, via:
#   kubectl apply -f infrastructure/argocd/observability.yaml
#
# Thereafter, ArgoCD reconciles drift between the cluster and the Helm
# chart's rendered manifests on every commit to main that touches
# infrastructure/helm/observability/**.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
  # Finalizer ensures cascading deletion of managed resources if the
  # Application is deleted. Without it, helm-deployed resources orphan.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: observability
    app.kubernetes.io/component: platform
spec:
  project: platform

  source:
    repoURL: https://github.com/Water-Hacker/RECOR.git
    targetRevision: main
    path: infrastructure/helm/observability
    helm:
      releaseName: recor-observability
      # The overlay file is selected per environment via ApplicationSet
      # in the consortium ArgoCD deployment; for the bootstrap commit
      # we point at the dev overlay.
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      # Cluster-scoped resources (CRDs from kube-prometheus-stack) must
      # be applied before namespace-scoped resources.
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m

  # Permitted drift indicators are documented; the team examines them
  # rather than auto-pruning.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # HPA-managed in production
    - group: ""
      kind: Secret
      name: recor-grafana-admin
      jsonPointers:
        - /data  # rotated out-of-band via ExternalSecret
