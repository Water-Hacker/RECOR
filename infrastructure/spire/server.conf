# SPIRE server configuration — dev / single-node.
#
# Trust domain: recor.cm — matches the SPIFFE IDs used in dev/integration
# (e.g. spiffe://recor.cm/declaration, spiffe://recor.cm/verification).
#
# Persistence: SQLite under /run/spire/data (mapped to the
# spire-server-data named volume in docker-compose.yaml). Production
# swaps this for the `sql` plugin pointing at a managed Postgres.
#
# Key manager: file-based, also under /run/spire/data. The CA private
# key is kept on the server's persistent volume. Production hardens
# this to AWS KMS / GCP KMS / HashiCorp Vault via the corresponding
# plugins; dev uses the disk plugin for simplicity.
#
# Node attestation: join-token, which the bootstrap script generates
# and feeds into the agent. Production uses k8s_psat (Kubernetes
# Projected Service Account Tokens) on the cluster side.

server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "recor.cm"
    data_dir = "/run/spire/data"
    log_level = "INFO"

    # CA TTL — 24h is the dev default. Production runs 12h-7d depending
    # on the SVID rotation window the operations team has agreed.
    ca_ttl = "24h"

    # SVID TTL — 1h. Workloads rotate transparently via the Workload API.
    default_x509_svid_ttl = "1h"
    default_jwt_svid_ttl = "5m"
}

plugins {
    # ─── Datastore (SQLite for dev; swap for `sql` plugin in prod) ───
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/run/spire/data/datastore.sqlite3"
        }
    }

    # ─── Node attestor: join-token (operator-issued, single-use) ─────
    NodeAttestor "join_token" {
        plugin_data {}
    }

    # ─── Key manager: file-based for dev ─────────────────────────────
    KeyManager "disk" {
        plugin_data {
            keys_path = "/run/spire/data/keys.json"
        }
    }
}
