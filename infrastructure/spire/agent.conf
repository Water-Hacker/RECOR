# SPIRE agent configuration — dev.
#
# Talks to the server at spire-server:8081 over the docker-compose
# bridge network. Joins via a single-use token issued by the
# bootstrap script (the operator generates the token with
# `spire-server token generate ...` and the agent consumes it on first
# attestation).
#
# Workload-attestor: `docker`. Selectors are
# `docker:label:org.spiffe.workload:<value>` — each application
# container declares the label so the agent can match it against the
# registration entries.

agent {
    data_dir = "/run/spire/data"
    log_level = "INFO"
    server_address = "spire-server"
    server_port = "8081"
    socket_path = "/tmp/spire-agent/public/api.sock"
    trust_domain = "recor.cm"
    # The trust-bundle bootstrap mode for dev is `--insecureBootstrap`
    # (the agent accepts the server's certificate on first connect
    # without out-of-band verification). Production uses
    # `trust_bundle_url` pointing at a KMS-signed initial bundle.
    insecure_bootstrap = true
}

plugins {
    # ─── Node attestor: join-token ───────────────────────────────────
    # The token is written into /run/spire/data/agent.token by the
    # bootstrap script before the agent first connects.
    NodeAttestor "join_token" {
        plugin_data {}
    }

    # ─── Workload attestor: docker label selectors ───────────────────
    WorkloadAttestor "docker" {
        plugin_data {
            docker_socket_path = "unix:///var/run/docker.sock"
        }
    }

    # ─── Workload attestor: unix (UID-based) ─────────────────────────
    # Useful in dev when running services directly on the host (cargo
    # run) rather than in a container.
    WorkloadAttestor "unix" {
        plugin_data {}
    }

    # ─── Key manager: in-memory for dev ──────────────────────────────
    # SVIDs are kept in agent memory and re-fetched after a restart.
    KeyManager "memory" {
        plugin_data {}
    }
}
