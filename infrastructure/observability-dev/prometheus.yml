# Prometheus — dev config
#
# Receives metrics from the OTel collector via remote-write
# (--web.enable-remote-write-receiver in docker-compose command), plus
# scrapes its own /metrics and the collector's internal /metrics endpoint.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: dev
    environment: dev

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: otelcol_.*
        action: keep
