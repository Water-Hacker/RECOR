# Grafana dashboard provisioning — load dashboards from disk on startup.

apiVersion: 1

providers:
  - name: recor-dev
    orgId: 1
    folder: "RÉCOR Dev"
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
