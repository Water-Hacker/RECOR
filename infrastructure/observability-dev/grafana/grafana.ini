; Grafana — dev config. The production deployment uses the kube-prometheus-stack
; Grafana sub-chart with its own values; this file is the dev-only baseline.

[server]
http_port = 3000
domain = localhost
root_url = http://localhost:3000/

[security]
; Admin credentials are sourced from env vars in docker-compose.yaml.
; This file does not embed defaults.
disable_initial_admin_creation = false
cookie_secure = false       ; dev: HTTP not HTTPS
allow_embedding = false

[users]
allow_sign_up = false
auto_assign_org_role = Viewer

[auth.anonymous]
enabled = false

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[log]
mode = console
level = info

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/recor-dev-stack-health.json

[feature_toggles]
enable = traceqlEditor traceqlSearch lokiQueryHints
