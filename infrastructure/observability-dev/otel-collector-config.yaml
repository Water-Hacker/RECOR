# OpenTelemetry Collector — dev config
#
# Mirrors the production config in infrastructure/helm/observability/values.yaml
# § opentelemetry-collector.config but with dev endpoints (docker network DNS,
# not k8s cluster DNS).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  batch:
    timeout: 1s
    send_batch_size: 512
    send_batch_max_size: 1024
  resource:
    attributes:
      - key: deployment.environment
        value: dev
        action: upsert
      - key: service.namespace
        value: recor
        action: insert

exporters:
  # Metrics → Prometheus via remote-write
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    resource_to_telemetry_conversion:
      enabled: true
    tls:
      insecure: true
  # Traces → Tempo via OTLP
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Logs → Loki via the loki exporter
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
  # Debug logging exporter (useful when investigating ingestion failures;
  # not in production exporters list)
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [loki]
  telemetry:
    metrics:
      level: detailed
      address: 0.0.0.0:8888
    logs:
      level: info
      encoding: json
