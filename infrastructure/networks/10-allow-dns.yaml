# Allow egress to kube-dns so RÉCOR pods can resolve in-cluster
# DNS names. Required for every other allow-egress policy because
# Postgres / Vault / SPIRE / Kafka are reached by FQDN.
#
# Matches the `kube-system` kube-dns service by namespace + label.
# Both UDP 53 (lookup) and TCP 53 (large responses) are allowed.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
  namespace: recor
  labels:
    app.kubernetes.io/part-of: recor
    audit.recor.cm/finding: FIND-007
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
