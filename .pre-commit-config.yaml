# Pre-commit hooks for the RÉCOR monorepo
# Engineers install once via `pre-commit install`; thereafter every commit
# is validated against the hooks below.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^infrastructure/helm/.*/templates/.*\.yaml$
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: clippy
        name: clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: gofmt
        name: gofmt
        entry: gofmt -l -d
        language: system
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false

      - id: eslint
        name: eslint
        entry: pnpm eslint --max-warnings 0
        language: system
        types: [ts, tsx, js, jsx]
        require_serial: true

      - id: prettier
        name: prettier
        entry: pnpm prettier --check
        language: system
        types_or: [ts, tsx, js, jsx, json, yaml, markdown]

      - id: buf-lint
        name: buf lint
        entry: buf lint
        language: system
        types: [proto]
        pass_filenames: false

      - id: terraform-fmt
        name: terraform fmt
        entry: terraform fmt -check -recursive
        language: system
        types: [terraform]

      - id: opa-fmt
        name: opa fmt
        entry: opa fmt --diff
        language: system
        types: [rego]
