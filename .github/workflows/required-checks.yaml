# Required-checks orchestrator for RÉCOR.
#
# The job names in this file are the names branch-protection on `main` will
# reference as required status checks. Adding/removing jobs here is therefore
# a branch-protection-relevant change; coordinate with the apply-branch-protection
# script and re-run it after merge.
#
# Per Architecture V1 P3 § DevSecOps integration: security checks shift left
# and run on every PR, not only at a pre-release gate.

name: required-checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: required-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Linting ──────────────────────────────────────────────────────────────
  lint-yaml:
    name: "lint / yaml"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: yamllint
        run: |
          pip install --user yamllint==1.35.1
          # Helm templates contain Go-template directives that yamllint
          # cannot parse; exclude that subtree.
          yamllint \
            --strict \
            -d "{extends: relaxed, rules: {line-length: {max: 200}}}" \
            .github/ \
            $(find infrastructure -name '*.yaml' -not -path '*/helm/*/templates/*' 2>/dev/null || true)

  lint-shell:
    name: "lint / shell"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: bash -n syntax check
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            bash -n "$f"
          done < <(find tools .claude/hooks tests -name '*.sh' -print0 2>/dev/null)
      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          # SC1091: skip-sourced-file warnings (CI doesn't have the deps).
          # SC2034: unused-vars (sometimes used as documentation).
          # SC2053: glob-on-rhs is intentional in our hook patterns.
          # SC2155: declare-and-assign separately — known pattern in our
          #   smoke scripts where the openssl fallback is fine.
          SHELLCHECK_OPTS: -e SC1091 -e SC2034 -e SC2053 -e SC2155
        with:
          scandir: ./tools
          severity: error
          additional_files: '.claude/hooks/pre-edit-doctrine-check.sh .claude/hooks/pre-bash-allowlist.sh .claude/hooks/post-edit-format.sh .claude/hooks/post-bash-audit.sh'

  lint-markdown:
    name: "lint / markdown"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          # Config lives at .markdownlint-cli2.jsonc in the repo root.
          globs: |
            **/*.md
            !**/node_modules/**
            !**/target/**
            !**/_extracted/**
            !**/.cargo-cache/**
            !**/.pnpm-store/**
            !**/dist/**
            !.claude/**
            !tests/contract/fixtures/**
            !docs/architecture/**
            !docs/concept-note/**
            !docs/build-spec/**
            !docs/companion/**
            !graphify-out/**

  # ─── Secrets ──────────────────────────────────────────────────────────────
  secrets-gitleaks:
    name: "secrets / gitleaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  secrets-detect-secrets:
    name: "secrets / detect-secrets"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: detect-secrets
        run: |
          pip install --user detect-secrets==1.5.0
          detect-secrets scan --baseline .secrets.baseline

  # ─── Governance ───────────────────────────────────────────────────────────
  governance-codeowners-validate:
    name: "governance / codeowners-validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: validate CODEOWNERS
        run: ./tools/ci/validate-codeowners.sh

  governance-pr-hygiene:
    name: "governance / pr-hygiene"
    runs-on: ubuntu-latest
    # pr-hygiene runs in its own workflow (.github/workflows/pr-hygiene.yaml)
    # because it needs additional permissions; this job is the protection
    # placeholder so branch protection can reference the name. The actual
    # check is in the dedicated workflow.
    steps:
      - run: echo "pr-hygiene runs in .github/workflows/pr-hygiene.yaml"

  governance-no-dangling:
    name: "governance / no-dangling"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: TODO-age check (best-effort at this stage)
        run: |
          # Doctrine 8: TODOs older than 2 sprints (28 days) are flagged.
          # At this stage of the build we have no merged TODOs yet; this
          # check enforces the rule going forward.
          set -euo pipefail
          old_todos=$(git log --since='28 days ago' --diff-filter=A --name-only --pretty=format: 2>/dev/null | sort -u | xargs -I{} sh -c '
            if [ -f "{}" ] && grep -lE "TODO|FIXME|XXX" "{}" >/dev/null 2>&1; then
              echo "{}"
            fi
          ' 2>/dev/null || true)
          # No assertion yet — this is the stub. Real enforcement when the
          # codebase has accumulated content.
          echo "TODO-age check: ${old_todos:-no findings}"

  governance-adr-bidi:
    name: "governance / adr-bidi"
    runs-on: ubuntu-latest
    # Sprint-4 audit closure: every ADR cross-link must be bidirectional.
    # D05 (docs are part of the feature) — a one-way link rot-traps as
    # the linked-to ADR mutates without the linked-from updating.
    steps:
      - uses: actions/checkout@v6
      - name: ADR cross-link bidirectionality
        run: ./tools/ci/check-adr-bidi.sh

  # ─── Claude Code config ───────────────────────────────────────────────────
  claude-config-validate:
    name: "claude-config-validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install pyyaml
        run: pip install --user pyyaml==6.0.2
      - name: validate .claude/ configuration
        run: ./tools/ci/validate-claude-config.sh

  # ─── API contract ─────────────────────────────────────────────────────────
  api-openapi-drift:
    # DOC-1 (#72): the committed `docs/openapi/declaration.json` snapshot
    # must match what `cargo run --bin dump-openapi` emits. Drift here
    # means a consumer regenerating its typed client from the snapshot
    # gets a different shape than the service actually serves — a
    # silent contract break. Fail-closed: no `continue-on-error`.
    name: "api / openapi-drift"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install rust toolchain
        # rust-toolchain.toml at the repo root pins to 1.88.0; this
        # action honours that file so we don't pin twice.
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
      - name: install librdkafka build deps
        # R-LOOP-2 added rdkafka (via the declaration crate's kafka_producer
        # module). rdkafka-sys builds librdkafka from source and needs
        # cmake + libcurl headers at compile time, even when WITH_CURL=0
        # because some translation units include curl/curl.h unconditionally.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake build-essential libcurl4-openssl-dev
      - name: cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: openapi-drift-${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            openapi-drift-${{ runner.os }}-cargo-
      - name: regenerate spec + diff against the committed snapshot
        env:
          SQLX_OFFLINE: "true"
        run: ./tools/ci/check-openapi-drift.sh

  # ─── Database / sqlx offline cache ────────────────────────────────────────
  # R-DECL-7 (#71): every committed change that touches a sqlx query or a
  # migration must regenerate `services/<svc>/.sqlx/`. This job stands
  # up two scratch Postgres 17 databases (one per service), applies the
  # service's migrations, and runs `cargo sqlx prepare --check` against
  # the committed cache. If the cache is stale the job fails — branch
  # protection then refuses to merge (Doctrine 14: fail-closed at the
  # integration boundary). The regeneration procedure is documented at
  # `docs/runbooks/sqlx-cache-regeneration.md`.
  sqlx-cache-check:
    name: "db / sqlx-cache-check"
    runs-on: ubuntu-latest
    services:
      postgres-declaration:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      postgres-verification:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5436:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - name: install Rust toolchain (1.88.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
      - name: cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sqlx-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sqlx-
      - name: install sqlx-cli
        run: |
          cargo install sqlx-cli --version 0.8.6 \
            --no-default-features --features postgres,rustls --locked
      - name: install psql + librdkafka build deps
        # R-LOOP-2: cmake + libcurl-dev for the rdkafka-sys build.
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client cmake build-essential libcurl4-openssl-dev
      - name: apply declaration migrations
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for f in services/declaration/migrations/*.sql; do
            echo "applying $f"
            psql -h 127.0.0.1 -p 5435 -U postgres -d postgres \
                 -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: apply verification-engine migrations
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for f in services/verification-engine/migrations/*.sql; do
            echo "applying $f"
            psql -h 127.0.0.1 -p 5436 -U postgres -d postgres \
                 -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: verify declaration .sqlx cache is fresh
        working-directory: services/declaration
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5435/postgres
        run: cargo sqlx prepare --check -- --lib --bin recor-declaration
      - name: verify verification-engine .sqlx cache is fresh
        working-directory: services/verification-engine
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5436/postgres
        run: cargo sqlx prepare --check -- --lib --bin recor-verification-engine
      - name: confirm SQLX_OFFLINE=true workspace build succeeds
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --workspace --release

  # ─── Declarant portal / generated OpenAPI client ─────────────────────────
  # R-PORT-7: the committed TypeScript client at
  # applications/declarant-portal/src/generated/openapi.ts must match
  # what `pnpm openapi:gen` produces from the committed spec at
  # docs/openapi/declaration.json. Without this check, the portal can
  # drift silently from the service contract and a future spec change
  # might compile against a stale wire shape — exactly the kind of
  # signature-verification break D15 forbids. Fail-closed: there is no
  # `--allow-drift` escape.
  portal-openapi-client-drift:
    name: "portal / openapi-client-drift"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: applications/declarant-portal
    steps:
      - uses: actions/checkout@v6
      - name: install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install pnpm 9.12.3
        uses: pnpm/action-setup@v4
        with:
          version: "9.12.3"
          run_install: false
      - name: cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: portal-pnpm-${{ runner.os }}-${{ hashFiles('applications/declarant-portal/pnpm-lock.yaml') }}
          restore-keys: |
            portal-pnpm-${{ runner.os }}-
      - name: install portal dependencies
        run: pnpm install --frozen-lockfile
      - name: regenerate generated client + diff against the committed snapshot
        working-directory: .
        run: ./tools/ci/check-portal-openapi-client-drift.sh
