# Observability smoke — runs the F-007 contract test on every PR that
# touches the observability stack, plus daily against main.
#
# Per the F-007 plan, this workflow is NOT yet in the required-checks set
# referenced by branch protection. Promotion to required-check happens in
# a follow-up PR after the workflow has shown a few green runs.

name: observability-smoke

on:
  pull_request:
    paths:
      - 'infrastructure/observability-dev/**'
      - 'infrastructure/helm/observability/**'
      - 'tests/contract/observability-smoke.test.sh'
      - '.github/workflows/observability-smoke.yaml'
  push:
    branches: [main]
    paths:
      - 'infrastructure/observability-dev/**'
      - 'infrastructure/helm/observability/**'
  workflow_dispatch:
  schedule:
    # Daily at 02:00 UTC against main; catches dependency drift in upstream
    # images even when no PR has touched the stack.
    - cron: '0 2 * * *'

permissions:
  contents: read

concurrency:
  group: observability-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: docker-compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: install prerequisites
        run: |
          set -euo pipefail
          # docker compose v2 is bundled with the GitHub runner image
          docker compose version
          curl --version
          jq --version

      - name: validate compose file syntax
        working-directory: infrastructure/observability-dev
        run: docker compose config > /dev/null

      - name: smoke
        env:
          # Ephemeral; never persisted, never echoed.
          RECOR_GRAFANA_ADMIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The GITHUB_TOKEN is reused only as a per-run-unique random
          # string; it is not used for auth anywhere in the stack.
          ./tests/contract/observability-smoke.test.sh

      - name: collect logs on failure
        if: failure()
        working-directory: infrastructure/observability-dev
        run: |
          for svc in otel-collector prometheus tempo loki grafana; do
            echo "═══ ${svc} ═══"
            docker compose logs --no-color "$svc" | tail -200 || true
          done

      - name: tear down
        if: always()
        working-directory: infrastructure/observability-dev
        run: docker compose down -v --remove-orphans 2>&1 | tail -10
