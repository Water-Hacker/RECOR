server {
    listen 8082 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Trust the host header from the proxy (declarant-facing TLS
    # termination handles HTTPS; the container speaks plain HTTP).
    server_tokens off;

    # Static-asset caching — bundle filenames carry content-hashes so
    # an aggressive immutable cache is safe.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback — every non-static path returns index.html so React
    # Router (or window.location-based routing in this v1) can handle it.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Liveness probe.
    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # Security headers. Tightening CSP to match the actual hostnames
    # served by the Declaration service is a follow-up ticket.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
}
