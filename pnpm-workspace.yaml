# pnpm workspace declaration — TODO-063 closure.
#
# Until this file existed, `pnpm vitest run` at the repo root did
# not actually discover any package's vitest suite: pnpm was being
# invoked without a workspace, so `pnpm -r` had no children and the
# `just test` line `pnpm vitest run` only worked when invoked from
# inside `applications/declarant-portal/`. This file makes the root
# the authoritative pnpm workspace so `pnpm -r <script>` reaches
# every per-package script.
#
# Member glob policy: every TypeScript/JavaScript package the
# monorepo owns lives under `applications/`. New web/UI surfaces
# land there; node-based tooling lives in `tools/` (none today).
# When a tools/ subdir grows a package.json it must be added to
# this file explicitly — the `tools/*` glob is omitted on purpose
# so a stray `tools/some-script/node_modules` does not silently
# become a workspace member.
packages:
  - "applications/*"
